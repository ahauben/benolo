<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adhérer — BENOLO</title>
  <meta name="description" content="Inscrivez-vous gratuitement comme membre fondateur de BENOLO, la fédération belge des boissons no & low.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..500&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="assets/styles.css?v=14">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html"><img class="brand-logo" src="assets/logo-full.png" alt="BENOLO — Belgian No & Low Federation"></a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html" data-i18n="nav.home"></a>
        <a href="pourquoi.html" data-i18n="nav.why"></a>
        <div class="nav-item has-dropdown">
          <button class="nav-trigger" type="button" aria-expanded="false" aria-haspopup="true"><span data-i18n="nav.about"></span><svg class="caret" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></button>
          <div class="dropdown" role="menu">
            <a href="cadre-legal.html" data-i18n="nav.legal" role="menuitem"></a>
            <a href="federations.html" data-i18n="nav.fed" role="menuitem"></a>
          </div>
        </div>
        <div class="nav-item has-dropdown">
          <button class="nav-trigger" type="button" aria-expanded="false" aria-haspopup="true"><span data-i18n="nav.media"></span><svg class="caret" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l4 4 4-4"/></svg></button>
          <div class="dropdown" role="menu">
            <a href="actualites.html" data-i18n="nav.news" role="menuitem"></a>
            <a href="presse.html" data-i18n="nav.press" role="menuitem"></a>
          </div>
        </div>
        <a href="inscription.html" data-i18n="nav.join"></a>
      </nav>
      <div class="nav-right">
        <div class="lang" role="group" aria-label="Language">
          <button data-lang="fr">FR</button>
          <button data-lang="nl">NL</button>
          <button data-lang="en">EN</button>
        </div>
        <a class="btn btn-primary" href="inscription.html" data-i18n="nav.cta"></a>
        <button class="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="wrap">
      <span class="free-badge" data-i18n="join.free" style="margin-bottom:1.2rem;"></span>
      <h1 data-i18n="join.title"></h1>
      <p class="lede" data-i18n="join.lede"></p>
    </div>
  </section>

  <section style="padding-top:0;">
    <div class="wrap split">
      <!-- steps -->
      <div>
        <span class="eyebrow" data-i18n="join.eyebrow"></span>
        <div class="steps" style="margin-top:1.4rem;">
          <div class="step">
            <span class="n">1</span>
            <div><h3 data-i18n="join.step1_h"></h3><p data-i18n="join.step1_p"></p></div>
          </div>
          <div class="step">
            <span class="n">2</span>
            <div><h3 data-i18n="join.step2_h"></h3><p data-i18n="join.step2_p"></p></div>
          </div>
          <div class="step">
            <span class="n">3</span>
            <div><h3 data-i18n="join.step3_h"></h3><p data-i18n="join.step3_p"></p></div>
          </div>
        </div>
        <p class="muted" style="margin-top:2rem;font-size:.95rem;">
          <span data-i18n="join.alt"></span>
          <a href="mailto:contact@benolo.be" data-i18n="join.alt_link"></a>
        </p>

        <div class="card" style="margin-top:1.6rem;">
          <span class="num" data-i18n="join.cond_h"></span>
          <ul class="checks" style="margin:.2rem 0 0;">
            <li data-i18n="legal.cond1"></li>
            <li data-i18n="legal.cond2"></li>
            <li data-i18n="legal.cond3"></li>
            <li data-i18n="legal.cond4"></li>
          </ul>
        </div>
      </div>

      <!-- form -->
      <div class="form-card">
        <h3 data-i18n="join.form_title" style="margin-bottom:1.4rem;"></h3>

        <div class="form-success" role="status">
          <p style="margin:0;" data-i18n="join.success"></p>
          <p class="logo-attach" data-i18n="join.logo_attach" hidden></p>
        </div>

        <form id="join-form" novalidate>
          <div class="field">
            <label for="company" data-i18n="join.company"></label>
            <input id="company" name="company" type="text" required data-i18n-ph="join.company_ph">
          </div>
          <div class="field">
            <label for="contact" data-i18n="join.contact"></label>
            <input id="contact" name="contact" type="text" required data-i18n-ph="join.contact_ph">
          </div>
          <div class="field-row">
            <div class="field">
              <label for="email" data-i18n="join.email"></label>
              <input id="email" name="email" type="email" required placeholder="nom@société.be">
            </div>
            <div class="field">
              <label for="phone" data-i18n="join.phone"></label>
              <input id="phone" name="phone" type="tel" data-i18n-ph="join.phone_ph">
            </div>
          </div>
          <div class="field">
            <label for="type" data-i18n="join.type"></label>
            <select id="type" name="type">
              <option data-i18n="join.type_prod"></option>
              <option data-i18n="join.type_dist"></option>
              <option data-i18n="join.type_assoc"></option>
            </select>
          </div>
          <div class="field">
            <label for="brands" data-i18n="join.brands"></label>
            <input id="brands" name="brands" type="text" data-i18n-ph="join.brands_ph">
          </div>
          <div class="field">
            <label for="logo" data-i18n="join.logo"></label>
            <input id="logo" name="logo" type="file" class="file-input" accept="image/png,image/jpeg,image/svg+xml">
            <span class="hint" data-i18n="join.logo_hint"></span>
            <div id="logo-preview" class="logo-preview" hidden>
              <img alt="">
              <span class="fname"></span>
            </div>
          </div>
          <div class="field">
            <label for="message" data-i18n="join.message"></label>
            <textarea id="message" name="message" data-i18n-ph="join.message_ph"></textarea>
          </div>
          <div class="check-row field">
            <input id="consent" name="consent" type="checkbox" required>
            <label for="consent" data-i18n="join.consent"></label>
          </div>
          <button type="submit" class="btn btn-primary" data-i18n="join.submit"></button>
          <p class="form-note" data-i18n="join.note"></p>
        </form>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap">
      <div class="foot-grid">
        <div>
          <div class="foot-brand"><img class="foot-logo" src="assets/logo-foot.png" alt="BENOLO — Belgian No & Low Federation"></div>
          <p data-i18n="foot.tagline" style="max-width:38ch;margin-top:.8rem;"></p>
        </div>
        <div class="foot-col">
          <h4 data-i18n="foot.nav"></h4>
          <ul>
            <li><a href="pourquoi.html" data-i18n="nav.why"></a></li>
            <li><a href="cadre-legal.html" data-i18n="nav.legal"></a></li>
            <li><a href="federations.html" data-i18n="nav.fed"></a></li>
            <li><a href="actualites.html" data-i18n="nav.news"></a></li>
            <li><a href="presse.html" data-i18n="nav.press"></a></li>
            <li><a href="inscription.html" data-i18n="nav.join"></a></li>
          </ul>
        </div>
        <div class="foot-col">
          <h4 data-i18n="foot.contact"></h4>
          <ul>
            <li><a href="mailto:contact@benolo.be">contact@benolo.be</a></li>
            <li data-i18n="foot.rights"></li>
          </ul>
        </div>
      </div>
      <div class="foot-bottom">
        <span>© 2026 BENOLO</span>
        <span data-i18n="foot.note"></span>
      </div>
    </div>
  </footer>

  <script src="assets/i18n.js?v=14"></script>
  <script src="assets/main.js?v=14"></script>
</body>
</html>
