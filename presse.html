<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presse — BENOLO</title>
  <meta name="description" content="Espace presse de BENOLO. Communiqué de création de la fédération, 25 juin 2026, et ressources pour les journalistes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,350..600;1,9..144,350..500&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html"><span class="brand-word">BENOLO</span><span class="brand-base">Belgian No <span class="amp">&amp;</span> Low Federation</span></a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html" data-i18n="nav.home"></a>
        <a href="pourquoi.html" data-i18n="nav.why"></a>
        <a href="cadre-legal.html" data-i18n="nav.legal"></a>
        <a href="federations.html" data-i18n="nav.fed"></a>
        <a href="actualites.html" data-i18n="nav.news"></a>
        <a href="presse.html" data-i18n="nav.press"></a>
        <a href="inscription.html" data-i18n="nav.join"></a>
      </nav>
      <div class="nav-right">
        <div class="lang" role="group" aria-label="Language">
          <button data-lang="fr">FR</button>
          <button data-lang="nl">NL</button>
          <button data-lang="en">EN</button>
        </div>
        <a class="btn btn-primary" href="inscription.html" data-i18n="nav.cta"></a>
        <button class="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="wrap">
      <span class="eyebrow" data-i18n="press.eyebrow"></span>
      <h1 data-i18n="press.title"></h1>
      <p class="lede" data-i18n="press.lede"></p>
    </div>
  </section>

  <section style="padding-top:0;">
    <div class="wrap split" style="grid-template-columns:1.7fr 1fr;">
      <!-- press release -->
      <article class="press-release">
        <span class="press-kicker" data-i18n="press.r1_kicker"></span>
        <p class="press-dateline" data-i18n="press.r1_dateline"></p>
        <h2 data-i18n="press.r1_title"></h2>
        <p class="lead" data-i18n="press.r1_lead"></p>
        <p data-i18n="press.r1_p1"></p>
        <p data-i18n="press.r1_p2"></p>
        <blockquote class="press-quote">
          <span data-i18n="press.r1_quote"></span>
          <span class="attr" data-i18n="press.r1_quote_attr"></span>
        </blockquote>
        <p data-i18n="press.r1_p3"></p>

        <div class="press-boiler">
          <h3 data-i18n="press.boiler_h"></h3>
          <p data-i18n="press.boiler_p"></p>
          <p class="press-contact">
            <strong data-i18n="press.contact_h"></strong> ·
            <a href="mailto:presse@benolo.be" data-i18n="press.contact_v"></a>
          </p>
        </div>
      </article>

      <!-- side: resources -->
      <aside class="press-side">
        <div class="card">
          <span class="num" data-i18n="press.kit_h"></span>
          <p class="muted" style="font-size:.85rem;margin:0;" data-i18n="press.kit_date"></p>
          <p class="muted" style="font-size:.85rem;margin:.3rem 0 0;" data-i18n="press.kit_loc"></p>
        </div>
        <div class="card brand-lockup" style="background:var(--spruce);border-color:transparent;">
          <span class="foot-word">BENOLO</span>
          <span class="foot-base">Belgian No <span class="amp">&amp;</span> Low Federation</span>
        </div>
        <div class="card">
          <span class="num" data-i18n="press.contact_h"></span>
          <p style="margin:0;"><a href="mailto:presse@benolo.be" data-i18n="press.contact_v"></a></p>
        </div>
      </aside>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap">
      <div class="foot-grid">
        <div>
          <div class="foot-brand"><span class="foot-word">BENOLO</span><span class="foot-base">Belgian No <span class="amp">&amp;</span> Low Federation</span></div>
          <p data-i18n="foot.tagline" style="max-width:38ch;margin-top:.8rem;"></p>
        </div>
        <div class="foot-col">
          <h4 data-i18n="foot.nav"></h4>
          <ul>
            <li><a href="pourquoi.html" data-i18n="nav.why"></a></li>
            <li><a href="cadre-legal.html" data-i18n="nav.legal"></a></li>
            <li><a href="federations.html" data-i18n="nav.fed"></a></li>
            <li><a href="actualites.html" data-i18n="nav.news"></a></li>
            <li><a href="presse.html" data-i18n="nav.press"></a></li>
            <li><a href="inscription.html" data-i18n="nav.join"></a></li>
          </ul>
        </div>
        <div class="foot-col">
          <h4 data-i18n="foot.contact"></h4>
          <ul>
            <li><a href="mailto:contact@benolo.be">contact@benolo.be</a></li>
            <li><a href="mailto:presse@benolo.be">presse@benolo.be</a></li>
            <li data-i18n="foot.rights"></li>
          </ul>
        </div>
      </div>
      <div class="foot-bottom">
        <span>© 2026 BENOLO</span>
        <span data-i18n="foot.note"></span>
      </div>
    </div>
  </footer>

  <script src="assets/i18n.js"></script>
  <script src="assets/main.js"></script>
</body>
</html>
