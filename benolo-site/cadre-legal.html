<!DOCTYPE html>
<html lang="fr">
<head>

  <title>Cadre légal — BENOLO</title>
  <meta name="description" content="La forme juridique, l'objet social et la gouvernance de la fédération BENOLO, inspirés du modèle des fédérations sectorielles belges.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,350..600;1,9..144,350..500&family=Inter:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html">BENOLO<span class="dot">.</span><small>be</small></a>
      <nav class="nav-links" aria-label="Primary">
        <a href="index.html" data-i18n="nav.home"></a>
        <a href="pourquoi.html" data-i18n="nav.why"></a>
        <a href="cadre-legal.html" data-i18n="nav.legal"></a>
        <a href="federations.html" data-i18n="nav.fed"></a>
        <a href="inscription.html" data-i18n="nav.join"></a>
      </nav>
      <div class="nav-right">
        <div class="lang" role="group" aria-label="Language">
          <button data-lang="fr">FR</button>
          <button data-lang="nl">NL</button>
          <button data-lang="en">EN</button>
        </div>
        <a class="btn btn-primary" href="inscription.html" data-i18n="nav.cta"></a>
        <button class="burger" aria-label="Menu" aria-expanded="false"><span></span><span></span><span></span></button>
      </div>
    </div>
  </header>

  <section class="page-hero">
    <div class="wrap">
      <span class="eyebrow" data-i18n="legal.eyebrow"></span>
      <h1 data-i18n="legal.title"></h1>
      <p class="lede" data-i18n="legal.lede"></p>
    </div>
  </section>

  <!-- FORM + OBJECT -->
  <section style="padding-top:0;">
    <div class="wrap split">
      <div class="prose">
        <span class="eyebrow" data-i18n="legal.h_form"></span>
        <p data-i18n="legal.form_p"></p>
      </div>
      <div class="prose">
        <span class="eyebrow" data-i18n="legal.h_object"></span>
        <p data-i18n="legal.object_p"></p>
        <ul class="checks">
          <li data-i18n="legal.object_l1"></li>
          <li data-i18n="legal.object_l2"></li>
          <li data-i18n="legal.object_l3"></li>
          <li data-i18n="legal.object_l4"></li>
        </ul>
      </div>
    </div>
  </section>

  <hr class="divider">

  <!-- GOVERNANCE -->
  <section>
    <div class="wrap">
      <div class="section-head">
        <span class="eyebrow" data-i18n="legal.h_gov"></span>
        <p class="mt-0" style="font-size:var(--step-1);color:var(--muted);max-width:60ch;" data-i18n="legal.gov_p"></p>
      </div>
      <div class="grid grid-3">
        <div class="card">
          <span class="num">A</span>
          <h3 data-i18n="legal.gov_ag"></h3>
          <p data-i18n="legal.gov_ag_p"></p>
        </div>
        <div class="card">
          <span class="num">B</span>
          <h3 data-i18n="legal.gov_ca"></h3>
          <p data-i18n="legal.gov_ca_p"></p>
        </div>
        <div class="card">
          <span class="num">C</span>
          <h3 data-i18n="legal.gov_pr"></h3>
          <p data-i18n="legal.gov_pr_p"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- MEMBER CATEGORIES -->
  <section class="stat-band">
    <div class="wrap">
      <span class="eyebrow" data-i18n="legal.h_members"></span>
      <p style="color:#dfe9e2;max-width:62ch;margin:1rem 0 2.4rem;" data-i18n="legal.members_p"></p>
      <div class="grid grid-3">
        <div class="card" style="background:var(--spruce);border-color:transparent;">
          <span class="num" style="color:var(--zest);" data-i18n="legal.mem1_h"></span>
          <p style="color:#dfe9e2;" data-i18n="legal.mem1_p"></p>
        </div>
        <div class="card" style="background:var(--spruce);border-color:transparent;">
          <span class="num" style="color:var(--zest);" data-i18n="legal.mem2_h"></span>
          <p style="color:#dfe9e2;" data-i18n="legal.mem2_p"></p>
        </div>
        <div class="card" style="background:var(--spruce);border-color:transparent;">
          <span class="num" style="color:var(--zest);" data-i18n="legal.mem3_h"></span>
          <p style="color:#dfe9e2;" data-i18n="legal.mem3_p"></p>
        </div>
      </div>
    </div>
  </section>

  <!-- FUNDING -->
  <section>
    <div class="wrap split center">
      <div class="prose">
        <span class="eyebrow" data-i18n="legal.h_funding"></span>
        <p data-i18n="legal.funding_p"></p>
      </div>
      <div>
        <span class="free-badge" data-i18n="join.free"></span>
        <p class="ref" style="margin-top:1.4rem;" data-i18n="legal.disclaimer"></p>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap">
      <div class="foot-grid">
        <div>
          <div class="foot-brand">BENOLO<span class="dot">.</span>be</div>
          <p data-i18n="foot.tagline" style="max-width:38ch;margin-top:.8rem;"></p>
        </div>
        <div class="foot-col">
          <h4 data-i18n="foot.nav"></h4>
          <ul>
            <li><a href="pourquoi.html" data-i18n="nav.why"></a></li>
            <li><a href="cadre-legal.html" data-i18n="nav.legal"></a></li>
            <li><a href="federations.html" data-i18n="nav.fed"></a></li>
            <li><a href="inscription.html" data-i18n="nav.join"></a></li>
          </ul>
        </div>
        <div class="foot-col">
          <h4 data-i18n="foot.contact"></h4>
          <ul>
            <li><a href="mailto:contact@benolo.be">contact@benolo.be</a></li>
            <li data-i18n="foot.rights"></li>
          </ul>
        </div>

      <div class="foot-bottom">
        <span>© 2026 BENOLO</span>
        <span data-i18n="foot.note"></span>
      </div>
    </div>

  <script src="assets/main.js"></script>

</html>
